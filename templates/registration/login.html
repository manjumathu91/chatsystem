
{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">
                    Login
                </h3>


                <form method="POST">

                    {% csrf_token %}


                    {% if form.errors %}

                    <div class="alert alert-danger">

                        Invalid username or password.

                    </div>

                    {% endif %}



                    <div class="mb-3">

                        <label>
                            Username
                        </label>


                        <input 
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required>

                    </div>



                    <div class="mb-3">

                        <label>
                            Password
                        </label>


                        <input 
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>

                    </div>



                    <button 
                    type="submit"
                    class="btn btn-primary w-100">

                        Login

                    </button>


                </form>


                <p class="text-center mt-3">

                    Don't have an account?

                    <a href="{% url 'register' %}">
                        Register
                    </a>

                </p>


            </div>

        </div>

    </div>

</div>


{% endblock %}
